services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - CHROMA_HOST=chroma          
    volumes:
      - ./data:/app/data            
    depends_on:
      - chroma
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma  
    restart: unless-stopped

volumes:
  chroma_data:
